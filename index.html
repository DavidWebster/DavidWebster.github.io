<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>David Webster</title>
  <meta name="description" content="The personal website of David Webster.">
  <meta name="robots" content="index, follow">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>ᴅ</text></svg>">
  <style>
    :root {
      --bg: #fafafa;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --rule: #e4e4e4;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f10;
        --fg: #ededed;
        --muted: #8a8a8a;
        --rule: #262628;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    main {
      width: 100%;
      max-width: 32rem;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .tagline {
      margin: 0.75rem 0 0;
      color: var(--muted);
      font-size: 1.05rem;
    }
    .rule {
      width: 3rem;
      height: 1px;
      margin: 2rem auto 0;
      background: var(--rule);
      border: 0;
    }
    footer {
      position: fixed;
      bottom: 1.25rem;
      left: 0;
      right: 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }
    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      transition: border-color 0.15s ease;
    }
    a:hover { border-color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>David Webster</h1>
    <p class="tagline">This is my corner of the web.</p>
    <hr class="rule">
  </main>
</body>
</html>
