<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>David Webster</title>
  <meta name="description" content="The personal website of David Webster.">
  <meta name="robots" content="index, follow">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>ᴅ</text></svg>">
  <style>
    :root {
      --bg: #fafafa;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --rule: #e4e4e4;
      --dot: 26, 26, 26;
      --tint: 0, 0, 0;   /* set by JS to reflect time of day */
      --tint-a: 0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f10;
        --fg: #ededed;
        --muted: #8a8a8a;
        --rule: #262628;
        --dot: 237, 237, 237;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(130% 90% at 50% 0%, rgba(var(--tint), var(--tint-a)), transparent 70%),
        var(--bg);
      color: var(--fg);
      transition: background-color 1s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }
    #bg {
      position: fixed;
      inset: -40px;               /* overscan so tilt parallax never reveals edges */
      z-index: -1;
      display: block;
      will-change: transform;
    }
    main {
      width: 100%;
      max-width: 32rem;
      padding: 2rem;
      text-align: center;
    }
    .greeting {
      margin: 0 0 0.4rem;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      min-height: 1.4em;
    }
    .tagline {
      margin: 0;
      color: var(--fg);
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .rule {
      width: 3rem;
      height: 1px;
      margin: 2rem auto 0;
      background: var(--rule);
      border: 0;
    }
  </style>
</head>
<body>
  <canvas id="bg" aria-hidden="true"></canvas>
  <main>
    <p class="greeting" id="greeting"></p>
    <p class="tagline">This is David Webster's corner of the web.</p>
    <hr class="rule">
  </main>

  <script>
    // --- Time-aware greeting + tint (uses the visitor's own clock; nothing is stored) ---
    (function () {
      var h = new Date().getHours();

      var msg = h < 5 ? "Hello, night owl"
              : h < 12 ? "Good morning"
              : h < 18 ? "Good afternoon"
              : "Good evening";
      document.getElementById("greeting").textContent = msg;

      // A faint wash of colour from the top that shifts across the day.
      var tint = h < 5  ? { c: "70, 90, 170",  a: 0.10 }   // deep night — indigo
               : h < 11 ? { c: "120, 175, 225", a: 0.09 }  // morning — cool blue
               : h < 16 ? { c: "255, 235, 205", a: 0.07 }  // midday — soft warm light
               : h < 20 ? { c: "240, 150, 90",  a: 0.11 }  // dusk — amber
               :          { c: "90, 100, 180",  a: 0.10 }; // late evening — twilight
      var root = document.documentElement.style;
      root.setProperty("--tint", tint.c);
      root.setProperty("--tint-a", String(tint.a));
    })();

    // --- Generative background: a slow, drifting field of faint dots ---
    (function () {
      var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      var canvas = document.getElementById("bg");
      var ctx = canvas.getContext("2d");
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var dots = [];
      var W, H;

      function dotColor() {
        return getComputedStyle(document.documentElement).getPropertyValue("--dot").trim();
      }
      var color = dotColor();

      function resize() {
        W = canvas.clientWidth;
        H = canvas.clientHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        var target = Math.round((W * H) / 22000); // density scales with viewport
        dots = [];
        for (var i = 0; i < target; i++) {
          dots.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.6 + 0.4,
            vx: (Math.random() - 0.5) * 0.15,
            vy: (Math.random() - 0.5) * 0.15,
            a: Math.random() * 0.25 + 0.05
          });
        }
      }

      var LINK = 130;          // max distance at which two dots are joined
      var LINK2 = LINK * LINK;

      // --- Device-tilt parallax (mobile). tx/ty follow the tilt; px/py ease toward them. ---
      var MAX_SHIFT = 30;      // px of travel, kept within the 40px overscan
      var tx = 0, ty = 0, px = 0, py = 0, tilting = false;

      function clamp(v, m) { return v < -m ? -m : v > m ? m : v; }

      function onTilt(e) {
        if (e.gamma == null || e.beta == null) return;
        tilting = true;
        tx = clamp(e.gamma / 3, MAX_SHIFT);        // left/right lean
        ty = clamp((e.beta - 45) / 3, MAX_SHIFT);  // front/back, ~45° = neutral hold
      }

      function enableTilt() {
        var DOE = window.DeviceOrientationEvent;
        if (!DOE) return;
        // iOS 13+ needs an explicit, gesture-triggered permission grant.
        if (typeof DOE.requestPermission === "function") {
          var ask = function () {
            DOE.requestPermission().then(function (state) {
              if (state === "granted") window.addEventListener("deviceorientation", onTilt);
            }).catch(function () {});
            window.removeEventListener("touchend", ask);
            window.removeEventListener("click", ask);
          };
          window.addEventListener("touchend", ask, { once: true });
          window.addEventListener("click", ask, { once: true });
        } else {
          window.addEventListener("deviceorientation", onTilt);
        }
      }
      if (!reduce) enableTilt();

      function draw() {
        // Ease the parallax offset toward the current tilt, then shift the field.
        if (tilting) {
          px += (tx - px) * 0.08;
          py += (ty - py) * 0.08;
          canvas.style.transform = "translate(" + px.toFixed(2) + "px," + py.toFixed(2) + "px)";
        }

        ctx.clearRect(0, 0, W, H);

        // Move every dot, wrapping softly around the edges.
        for (var i = 0; i < dots.length; i++) {
          var d = dots[i];
          d.x += d.vx;
          d.y += d.vy;
          if (d.x < 0) d.x += W; else if (d.x > W) d.x -= W;
          if (d.y < 0) d.y += H; else if (d.y > H) d.y -= H;
        }

        // Constellation: faint lines between dots that drift close together.
        ctx.lineWidth = 1;
        for (var a = 0; a < dots.length; a++) {
          for (var b = a + 1; b < dots.length; b++) {
            var dx = dots[a].x - dots[b].x;
            var dy = dots[a].y - dots[b].y;
            var d2 = dx * dx + dy * dy;
            if (d2 < LINK2) {
              var alpha = (1 - Math.sqrt(d2) / LINK) * 0.12;
              ctx.strokeStyle = "rgba(" + color + "," + alpha + ")";
              ctx.beginPath();
              ctx.moveTo(dots[a].x, dots[a].y);
              ctx.lineTo(dots[b].x, dots[b].y);
              ctx.stroke();
            }
          }
        }

        // Dots on top of the lines.
        for (var j = 0; j < dots.length; j++) {
          var p = dots[j];
          ctx.beginPath();
          ctx.fillStyle = "rgba(" + color + "," + p.a + ")";
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }

        if (!reduce) requestAnimationFrame(draw);
      }

      resize();
      window.addEventListener("resize", resize);
      // Re-read the dot colour if the OS theme flips while the page is open.
      if (window.matchMedia) {
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () {
          color = dotColor();
        });
      }
      draw(); // draws once (static) if reduced motion is preferred, otherwise animates
    })();
  </script>
</body>
</html>
