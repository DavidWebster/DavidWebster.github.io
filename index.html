<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>David Webster</title>
  <meta name="description" content="The personal website of David Webster.">
  <meta name="robots" content="index, follow">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>ᴅ</text></svg>">
  <style>
    :root {
      --bg: #fafafa;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --rule: #e4e4e4;
      --dot: 26, 26, 26;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f10;
        --fg: #ededed;
        --muted: #8a8a8a;
        --rule: #262628;
        --dot: 237, 237, 237;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }
    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      display: block;
    }
    main {
      width: 100%;
      max-width: 32rem;
      padding: 2rem;
      text-align: center;
    }
    .greeting {
      margin: 0 0 0.4rem;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      min-height: 1.4em;
    }
    .tagline {
      margin: 0;
      color: var(--fg);
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .rule {
      width: 3rem;
      height: 1px;
      margin: 2rem auto 0;
      background: var(--rule);
      border: 0;
    }
  </style>
</head>
<body>
  <canvas id="bg" aria-hidden="true"></canvas>
  <main>
    <p class="greeting" id="greeting"></p>
    <p class="tagline">This is David Webster's corner of the web.</p>
    <hr class="rule">
  </main>

  <script>
    // --- Time-aware greeting (uses the visitor's own clock; nothing is stored) ---
    (function () {
      var h = new Date().getHours();
      var msg = h < 5 ? "Hello, night owl"
              : h < 12 ? "Good morning"
              : h < 18 ? "Good afternoon"
              : "Good evening";
      document.getElementById("greeting").textContent = msg;
    })();

    // --- Generative background: a slow, drifting field of faint dots ---
    (function () {
      var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      var canvas = document.getElementById("bg");
      var ctx = canvas.getContext("2d");
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var dots = [];
      var W, H;

      function dotColor() {
        return getComputedStyle(document.documentElement).getPropertyValue("--dot").trim();
      }
      var color = dotColor();

      function resize() {
        W = canvas.clientWidth;
        H = canvas.clientHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        var target = Math.round((W * H) / 22000); // density scales with viewport
        dots = [];
        for (var i = 0; i < target; i++) {
          dots.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.6 + 0.4,
            vx: (Math.random() - 0.5) * 0.15,
            vy: (Math.random() - 0.5) * 0.15,
            a: Math.random() * 0.25 + 0.05
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        for (var i = 0; i < dots.length; i++) {
          var d = dots[i];
          d.x += d.vx;
          d.y += d.vy;
          if (d.x < 0) d.x += W; else if (d.x > W) d.x -= W;
          if (d.y < 0) d.y += H; else if (d.y > H) d.y -= H;
          ctx.beginPath();
          ctx.fillStyle = "rgba(" + color + "," + d.a + ")";
          ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
          ctx.fill();
        }
        if (!reduce) requestAnimationFrame(draw);
      }

      resize();
      window.addEventListener("resize", resize);
      // Re-read the dot colour if the OS theme flips while the page is open.
      if (window.matchMedia) {
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () {
          color = dotColor();
        });
      }
      draw(); // draws once (static) if reduced motion is preferred, otherwise animates
    })();
  </script>
</body>
</html>
